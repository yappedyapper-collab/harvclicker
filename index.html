<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harvey Clicker</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: radial-gradient(circle, #111, #000);
  color: white;
}

h1 { text-shadow: 0 0 10px lime; }

img {
  width: 220px;
  border-radius: 20px;
  cursor: pointer;
  box-shadow: 0 0 20px lime;
}
img:active { transform: scale(0.85); }

button {
  margin: 10px;
  padding: 12px;
  width: 260px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: linear-gradient(45deg, limegreen, green);
}
button:hover { transform: scale(1.05); }

/* RIGHT BUTTON */
#achBtn {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 60px;
  height: 60px;
  border-radius: 50%;
  font-size: 24px;
  background: gold;
  color: black;
  box-shadow: 0 0 15px gold;
}

/* PANEL */
#achievements {
  position: fixed;
  right: -300px;
  top: 0;
  width: 250px;
  height: 100%;
  background: #111;
  border-left: 2px solid gold;
  padding: 20px;
  transition: 0.3s;
}
#achievements.open { right: 0; }
</style>
</head>

<body>

<h1>🔥 HARVEY CLICKER 🔥</h1>

<img src="harvey.jpg" onclick="clickHarvey()">

<div id="score">Juice: 0</div>
<div id="perSec">Per Second: 0</div>
<div id="rebirths">Rebirths: 0 (x1)</div>

<button onclick="rebirth()">♻️ Rebirth (1000 Juice)</button>

<h2>🛒 Shop</h2>
<button onclick="buyClick()">Stronger Click - <span id="clickCost">10</span></button>
<button onclick="buyAuto()">Auto +1/sec - <span id="autoCost">25</span></button>
<button onclick="buyMega()">Mega +5/sec - <span id="megaCost">100</span></button>

<button id="achBtn" onclick="toggleAchievements()">🏆</button>

<div id="achievements">
  <h2>🏆 Achievements</h2>
  <p id="achList">None yet...</p>
</div>

<script>
// GAME STATE (GLOBAL)
let juice = 0;
let clickPower = 1;
let perSecond = 0;

let clickCost = 10;
let autoCost = 25;
let megaCost = 100;

let achievements = [];
let rebirths = 0;

// SOUNDS
const clickSound = new Audio("https://www.myinstants.com/media/sounds/mouse-click.mp3");
const buySound = new Audio("https://www.myinstants.com/media/sounds/cash-register.mp3");

// MULTIPLIER
function getMultiplier() {
  return 1 + rebirths * 0.5;
}

// CLICK
function clickHarvey() {
  juice += clickPower * getMultiplier();
  clickSound.play();
  checkAchievements();
  update();
}

// SHOP
function buyClick() {
  if (juice >= clickCost) {
    juice -= clickCost;
    clickPower++;
    clickCost = Math.floor(clickCost * 1.5);
    buySound.play();
    update();
  }
}

function buyAuto() {
  if (juice >= autoCost) {
    juice -= autoCost;
    perSecond++;
    autoCost = Math.floor(autoCost * 1.6);
    buySound.play();
    update();
  }
}

function buyMega() {
  if (juice >= megaCost) {
    juice -= megaCost;
    perSecond += 5;
    megaCost = Math.floor(megaCost * 1.8);
    buySound.play();
    update();
  }
}

// REBIRTH
function rebirth() {
  if (juice >= 1000) {
    rebirths++;
    juice = 0;
    clickPower = 1;
    perSecond = 0;
    clickCost = 10;
    autoCost = 25;
    megaCost = 100;
    update();
  }
}

// ACHIEVEMENTS
function unlockAchievement(name) {
  if (!achievements.includes(name)) {
    achievements.push(name);
  }
}

function checkAchievements() {
  if (juice >= 10) unlockAchievement("Beginner");
  if (juice >= 100) unlockAchievement("Juice Master");
  if (juice >= 1000) unlockAchievement("Harvey God");
  if (rebirths >= 1) unlockAchievement("First Rebirth");
}

// PANEL
function toggleAchievements() {
  document.getElementById("achievements").classList.toggle("open");
}

// UPDATE UI
function update() {
  document.getElementById("score").innerText = "Juice: " + Math.floor(juice);
  document.getElementById("perSec").innerText = "Per Second: " + perSecond;
  document.getElementById("rebirths").innerText =
    "Rebirths: " + rebirths + " (x" + getMultiplier().toFixed(1) + ")";

  document.getElementById("clickCost").innerText = clickCost;
  document.getElementById("autoCost").innerText = autoCost;
  document.getElementById("megaCost").innerText = megaCost;

  document.getElementById("achList").innerHTML =
    achievements.length
      ? achievements.map(a => "✔ " + a).join("<br>")
      : "None yet...";

  save();
}

// AUTO
setInterval(() => {
  juice += perSecond * getMultiplier();
  checkAchievements();
  update();
}, 1000);

// SAVE
function save() {
  localStorage.setItem("harveySave", JSON.stringify({
    juice, clickPower, perSecond, clickCost, autoCost, megaCost, achievements, rebirths
  }));
}

function load() {
  let data = JSON.parse(localStorage.getItem("harveySave"));
  if (data) {
    juice = data.juice;
    clickPower = data.clickPower;
    perSecond = data.perSecond;
    clickCost = data.clickCost;
    autoCost = data.autoCost;
    megaCost = data.megaCost;
    achievements = data.achievements || [];
    rebirths = data.rebirths || 0;
  }
}

// 🔥 CHEAT COMMANDS BUILT-IN
window.game = {
  addJuice(amount) {
    juice += amount;
    update();
  },

  setJuice(amount) {
    juice = amount;
    update();
  },

  addRebirths(amount) {
    rebirths += amount;
    update();
  },

  maxAll() {
    juice = 999999;
    clickPower = 100;
    perSecond = 100;
    rebirths = 10;
    update();
  }
};

load();
update();
</script>

</body>
</html>
