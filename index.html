<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harvey Clicker</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: radial-gradient(circle, #111, #000);
  color: white;
}

/* TITLE */
h1 {
  text-shadow: 0 0 10px lime;
}

/* HARVEY */
img {
  width: 220px;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.1s;
  box-shadow: 0 0 20px lime;
}

img:active {
  transform: scale(0.85);
}

/* STATS */
#score, #perSec {
  font-size: 22px;
  margin: 10px;
}

/* SHOP */
.shop {
  margin-top: 20px;
  padding: 15px;
  border-radius: 15px;
  background: rgba(0,255,0,0.05);
  box-shadow: 0 0 10px #00ff00;
}

/* BUTTONS */
button {
  display: block;
  margin: 10px auto;
  padding: 12px;
  width: 260px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  background: linear-gradient(45deg, limegreen, green);
  color: black;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px lime;
}

/* ACHIEVEMENTS */
#achievements {
  margin-top: 20px;
  padding: 10px;
  border-radius: 10px;
  background: rgba(255,255,0,0.05);
  box-shadow: 0 0 10px gold;
}
</style>
</head>

<body>

<h1>🔥 HARVEY CLICKER 🔥</h1>

<img src="harvey.jpg" onclick="clickHarvey()">

<div id="score">Juice: 0</div>
<div id="perSec">Per Second: 0</div>

<div class="shop">
<h2>🛒 Upgrades</h2>

<button onclick="buyClick()">
Stronger Click (+1) - Cost: <span id="clickCost">10</span>
</button>

<button onclick="buyAuto()">
Auto Clicker (+1/sec) - Cost: <span id="autoCost">25</span>
</button>

<button onclick="buyMega()">
Mega Juice (+5/sec) - Cost: <span id="megaCost">100</span>
</button>
</div>

<div id="achievements">
<h2>🏆 Achievements</h2>
<p id="achList">None yet...</p>
</div>

<script>
// GAME DATA
let juice = 0;
let clickPower = 1;
let perSecond = 0;

let clickCost = 10;
let autoCost = 25;
let megaCost = 100;

let achievements = [];

// 🔊 SOUND
const clickSound = new Audio("https://www.myinstants.com/media/sounds/mouse-click.mp3");
const buySound = new Audio("https://www.myinstants.com/media/sounds/cash-register.mp3");

// CLICK
function clickHarvey() {
  juice += clickPower;
  clickSound.currentTime = 0;
  clickSound.play();
  checkAchievements();
  update();
}

// BUY
function buyClick() {
  if (juice >= clickCost) {
    juice -= clickCost;
    clickPower++;
    clickCost = Math.floor(clickCost * 1.5);
    buySound.play();
    update();
  }
}

function buyAuto() {
  if (juice >= autoCost) {
    juice -= autoCost;
    perSecond += 1;
    autoCost = Math.floor(autoCost * 1.6);
    buySound.play();
    update();
  }
}

function buyMega() {
  if (juice >= megaCost) {
    juice -= megaCost;
    perSecond += 5;
    megaCost = Math.floor(megaCost * 1.8);
    buySound.play();
    update();
  }
}

// 🏆 ACHIEVEMENTS
function checkAchievements() {
  if (juice >= 10 && !achievements.includes("Beginner")) {
    achievements.push("Beginner 🟢");
  }
  if (juice >= 100 && !achievements.includes("Juice Master")) {
    achievements.push("Juice Master 🟡");
  }
  if (juice >= 1000 && !achievements.includes("Harvey God")) {
    achievements.push("Harvey God 🔴");
  }
}

// UPDATE UI
function update() {
  document.getElementById("score").innerText = "Juice: " + juice;
  document.getElementById("perSec").innerText = "Per Second: " + perSecond;
  document.getElementById("clickCost").innerText = clickCost;
  document.getElementById("autoCost").innerText = autoCost;
  document.getElementById("megaCost").innerText = megaCost;

  document.getElementById("achList").innerText =
    achievements.length ? achievements.join(", ") : "None yet...";

  save();
}

// AUTO
setInterval(() => {
  juice += perSecond;
  checkAchievements();
  update();
}, 1000);

// SAVE
function save() {
  localStorage.setItem("harveySave", JSON.stringify({
    juice, clickPower, perSecond, clickCost, autoCost, megaCost, achievements
  }));
}

function load() {
  let saveData = JSON.parse(localStorage.getItem("harveySave"));
  if (saveData) {
    juice = saveData.juice;
    clickPower = saveData.clickPower;
    perSecond = saveData.perSecond;
    clickCost = saveData.clickCost;
    autoCost = saveData.autoCost;
    megaCost = saveData.megaCost;
    achievements = saveData.achievements || [];
  }
}

load();
update();
</script>

</body>
</html>
